name: OSSF Scorecard

# NOTE: This repo is currently INTERNAL (GitHub Enterprise). The OSSF
# Scorecard action cannot score internal/private repos via ListCommits
# ("Resource not accessible by integration"). The workflow is kept so it
# activates automatically when the repo flips to public; meanwhile it is
# reachable only via workflow_dispatch to avoid noisy push/schedule
# failures.

on:
  workflow_dispatch:

permissions: {}

jobs:
  analysis:
    name: OSSF Scorecard analysis
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        # Pin to v2.4.0 (released 2025-09); the short @v2 tag is no longer
        # resolvable by actions. publish_results is false for now because
        # the org-level OpenSSF Scorecard app is not installed on this repo
        # — SARIF is still uploaded to GitHub Security below.
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ossf-scorecard-results
          path: results.sarif
          retention-days: 5
