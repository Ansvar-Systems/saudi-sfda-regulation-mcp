name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      # Smoke tests run against the committed pre-ingested database in
      # data/sfda.db (40 frameworks + 40 controls + 72 circulars,
      # journal_mode=DELETE). Do NOT `npm run seed` here — that would
      # overwrite the real database with a sample fixture and fail both
      # row-count and journal_mode assertions.
      - run: npm test
